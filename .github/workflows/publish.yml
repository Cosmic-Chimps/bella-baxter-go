name: Publish Go SDK (pkg.go.dev)

# Go has no central registry — pkg.go.dev auto-indexes any public GitHub repo
# when a semver tag is pushed. This workflow verifies the VERSION file,
# regenerates the Kiota client from openapi.json (committed in repo),
# and creates a GitHub Release.
# Triggered by release-sdk.yml creating a tag on this repo.

on:
  push:
    tags:
      - 'v*'

env:
  SDK_FOLDER: .

jobs:
  publish:
    name: Publish bella-baxter-go
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Install Kiota
        run: dotnet tool install --global Microsoft.OpenApi.Kiota --version 1.30.0

      - name: Generate Go client from OpenAPI spec
        run: kiota update -o generated

      - name: Commit generated files if changed (safety net — normally a no-op)
        run: |
          git config user.email "bot@bella-baxter.io"
          git config user.name "Bella Baxter Bot"
          git add -f generated/
          if git diff --cached --quiet; then
            echo "generated/ unchanged — release-sdk.yml already pre-committed it before tagging"
          else
            # This should rarely (never) happen since release-sdk.yml pre-generates.
            # If it does happen, commit and push to main ONLY (do NOT move the tag —
            # force-pushing a tag breaks the Go module proxy cache immutability guarantee).
            git commit -m "chore: regenerate Go client for ${{ github.ref_name }} [safety-net]"
            git push origin HEAD:main
            echo "⚠️ generated/ was unexpectedly changed — committed to main (tag NOT moved)"
          fi

      - name: Verify VERSION file matches tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION=$(cat VERSION 2>/dev/null || echo "")
          if [ "$FILE_VERSION" != "$VERSION" ]; then
            echo "::error::VERSION file has '$FILE_VERSION' but tag is '$VERSION' — run release-sdk.yml first"
            exit 1
          fi
          echo "✓ VERSION file $FILE_VERSION matches tag $VERSION"

      - name: Set production API URL
        run: |
          BELLA_BAXTER_API_URL="${{ vars.BELLA_BAXTER_API_URL || 'https://api.bella-baxter.io' }}"
          if [ "$BELLA_BAXTER_API_URL" != "https://api.bella-baxter.io" ]; then
            grep -rl 'https://api.bella-baxter.io' . --include='*.go' \
              | xargs sed -i "s|https://api.bella-baxter.io|${BELLA_BAXTER_API_URL}|g"
          fi

      - name: Update go.sum and commit (safety net — tag is NOT moved)
        run: |
          GONOSUMDB=github.com/cosmic-chimps/* go mod tidy
          if git diff --quiet go.sum go.mod; then
            echo "go.sum unchanged"
          else
            git add go.sum go.mod
            git commit -m "chore: update go.sum for ${{ github.ref_name }} [safety-net]"
            git push origin HEAD:main
            # Do NOT move the tag — the Go module proxy caches are immutable.
            # go.sum is not part of what go get downloads; only source files matter.
            echo "⚠️ go.sum updated on main (tag NOT moved — proxy caches are immutable)"
          fi

      - name: Build
        run: go build ./...

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'Go SDK ${{ github.ref_name }}'
          generate_release_notes: true

  notify:
    runs-on: ubuntu-latest
    needs: publish
    if: always()
    steps:
      - uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: |
            text: "${{ needs.publish.result == 'success' && '✅' || needs.publish.result == 'failure' && '❌' || '⚠️' }} *SDK Go publish ${{ github.ref_name }}*: ${{ needs.publish.result }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
